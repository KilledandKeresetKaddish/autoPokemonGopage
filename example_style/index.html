<!doctype html>
<script src="/seffects/star-effects.js"></script>
<script src="/seffects/star-effects-panel.js"></script>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Adonais's page</title>

  <link rel="icon" type="image/x-icon" href="/themepic/index_favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Noto+Serif+SC:wght@500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#0c0b10;
      --bg2:#100e16;
      --gold:#c79a4f;
      --gold-rgb:199,154,79; /* 主色 RGB，供 rgba() 光晕/阴影用，随主题切换 */
      --gold-bright:#e8cb8c;
      --gold-line:#b08d4c;
      --gold-dim:#7a6334;
      --gold-numeral:#8f6f33;
      --ink:#e8cb8c;
      --muted:#9d8a5e;
      --h1:#f3e3bd;
    }
    *{box-sizing:border-box}
    html,body{min-height:100%}
    body{
      margin:0;
      color:var(--ink);
      background:
        linear-gradient(180deg, rgba(10,9,14,0.64) 0%, rgba(9,8,12,0.72) 52%, rgba(7,6,10,0.84) 100%),
        url("/themepic/index_bg.png") /* 默认背景图，可被 LAYOUT.pageBg 覆盖 */ center 48%/cover no-repeat,
        #0c0b10;
      font-family:"Cormorant Garamond","Noto Serif SC","Source Han Serif SC","Songti SC","STSong",Georgia,serif;
      min-height:100vh;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      position:relative;
      overflow:hidden;
    }
    /* 当 LAYOUT.pageBg 启用独立背景层时，隐藏 body 自带的背景图，避免双重背景 */
    body.has-bg-layer{ background:#0c0b10; }
    /* 背景层：承载背景图与模糊，模糊只作用于图，不影响上层文字 */
    #pageBgLayer{
      position:fixed; inset:0; z-index:-2; display:none;
      background-position:center 48%; background-size:cover; background-repeat:no-repeat;
      transform:scale(1.06); /* 配合模糊，避免边缘透出 */
    }
    /* 背景层之上压一层渐变，保持原来的暗化质感与可读性 */
    body.has-bg-layer::after{
      content:''; position:fixed; inset:0; z-index:-1; pointer-events:none;
      background:linear-gradient(180deg, rgba(10,9,14,0.64) 0%, rgba(9,8,12,0.72) 52%, rgba(7,6,10,0.84) 100%);
    }
    /* starfield (JS box-shadow) */
    .stars,.stars2{position:fixed;top:0;left:0;width:1px;height:1px;border-radius:50%;z-index:0;pointer-events:none;}
    .stars{background:rgba(232,203,140,.55)}
    .stars2{background:rgba(232,203,140,.3)}
    /* faint warm glow behind the spread */
    body::before{
      content:'';position:fixed;left:50%;top:46%;transform:translate(-50%,-50%);
      width:1100px;height:620px;
      background:radial-gradient(closest-side, rgba(var(--gold-rgb),.10), transparent 72%);
      z-index:0;pointer-events:none;
    }

    .wrap{width:var(--wrap-width,1400px);position:relative;z-index:2;transform-origin:center center;}

    /* ---------- masthead ---------- */
    .masthead{text-align:center;margin:0 0 20px;}
    .orn{display:flex;align-items:center;justify-content:center;gap:12px;color:var(--gold);}
    .orn::before,.orn::after{content:'';height:1px;width:64px;
      background:linear-gradient(90deg,transparent,var(--gold-line));}
    .orn::after{background:linear-gradient(90deg,var(--gold-line),transparent);}
    .orn .dia{font-size:11px;letter-spacing:.4em;}
    .kicker{margin:7px 0 0;font-family:"Spline Sans Mono",monospace;font-size:11px;
      letter-spacing:.5em;text-transform:uppercase;color:var(--muted);}
    h1{margin:4px 0 4px;font-weight:600;font-size:46px;
      letter-spacing:.18em;color:var(--h1,#f3e3bd);line-height:1;
      text-shadow:0 0 32px rgba(var(--gold-rgb),.25);}
    .meta{margin:0;font-family:"Spline Sans Mono",monospace;font-size:11px;
      letter-spacing:.16em;color:var(--gold-dim);}

    /* ---------- spread ---------- */
    .spread{display:grid;grid-template-columns:repeat(var(--cols,6),minmax(0,1fr));gap:var(--gap,12px);align-items:stretch;width:100%;margin:0;}
    @media (max-width:760px){.wrap{width:auto!important;max-width:520px;transform:none!important;} .spread{grid-template-columns:repeat(var(--cols-mobile,2),minmax(0,1fr));}}

    .tcard{
      position:relative;display:flex;flex-direction:column;align-items:center;
      padding:20px 14px 14px;min-height:var(--card-min-h,430px);
      background:
        radial-gradient(120% 60% at 50% 0%, rgba(var(--gold-rgb),.08), transparent 60%),
        linear-gradient(180deg, rgba(16,14,22,0.78), rgba(11,10,15,0.82));
      border:1px solid var(--gold-line);
      border-radius:12px;
      box-shadow:0 10px 22px rgba(0,0,0,.45), inset 0 0 30px rgba(var(--gold-rgb),.04);
      transition:transform .2s ease, border-color .2s ease;
    }
    /* inner hairline frame */
    .tcard::before{content:'';position:absolute;inset:7px;border:1px solid rgba(var(--gold-rgb),.32);
      border-radius:8px;pointer-events:none;}
    /* top & bottom frame diamonds */
    .tcard::after{content:'◆';position:absolute;top:-1px;left:50%;transform:translate(-50%,-58%);
      color:var(--gold);font-size:9px;background:var(--bg);padding:0 6px;}
    .tcard:hover{transform:translateY(-4px);border-color:var(--gold);
      box-shadow:0 16px 30px rgba(0,0,0,.5), 0 0 0 1px rgba(var(--gold-rgb),.18), inset 0 0 34px rgba(var(--gold-rgb),.06);}

    /* sealed / inactive cards */
    .tcard--sealed{filter:grayscale(.3);opacity:.5;}
    .tcard--sealed .title{font-family:"Cormorant Garamond",serif;font-style:italic;
      font-size:22px;letter-spacing:.04em;color:var(--gold-dim);}

    /* entrance animation — only applied via .anim-in once the tab is visible,
       so cards never get stuck hidden if animations are paused */
    @keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    @keyframes cardInSealed{from{opacity:0;transform:translateY(16px)}to{opacity:.5;transform:none}}
    .tcard.anim-in{animation:cardIn .55s cubic-bezier(.22,.9,.3,1) backwards;
      animation-delay:calc(.04s + var(--i,0) * .08s);}
    .tcard--sealed.anim-in{animation-name:cardInSealed;}
    @media (prefers-reduced-motion:reduce){.tcard{animation:none!important}}

    .numeral{font-size:14px;letter-spacing:.34em;color:var(--gold-numeral);
      display:flex;align-items:center;gap:9px;}
    .numeral::before,.numeral::after{content:'';width:16px;height:1px;background:var(--gold-line);opacity:.7;}

    .emblem{width:86px;height:86px;margin:12px 0 2px;display:block;overflow:visible;transition:transform .4s cubic-bezier(.34,1.4,.5,1);}
    .emblem-link{display:flex;justify-content:center;align-items:center;text-decoration:none;cursor:pointer;}
    .emblem-img{width:86px;height:86px;object-fit:contain;display:block;margin:12px 0 2px;border-radius:12px;
      transition:transform .4s cubic-bezier(.34,1.4,.5,1);}
    /* 悬停动画：SVG 徽记与 PNG/外链图片徽记统一抬起 + 轻微倾斜缩放 */
    .tcard:hover .emblem,
    .tcard:hover .emblem-img{transform:translateY(-4px) rotate(-5deg) scale(1.06);}
    .emblem-link:hover .emblem,
    .emblem-link:hover .emblem-img{transform:translateY(-4px) rotate(-5deg) scale(1.08);
      filter:drop-shadow(0 0 8px rgba(var(--gold-rgb),.45));}
    .emblem .ln{fill:none;stroke:var(--gold);stroke-width:1;}
    .emblem .ln-d{fill:none;stroke:var(--gold);stroke-width:1;opacity:.55;}
    .emblem .fill{fill:var(--gold);}

    .title{margin:6px 0 3px;font-size:16px;font-weight:600;letter-spacing:.06em;
      color:#f3e3bd;text-align:center;white-space:nowrap;line-height:1.1;}
    .subtitle{margin:0;font-family:"Spline Sans Mono",monospace;font-size:9px;
      letter-spacing:.06em;color:var(--muted);text-transform:uppercase;text-align:center;line-height:1.5;}

    .rule{display:flex;align-items:center;gap:8px;width:82px;margin:12px 0;color:var(--gold);}
    .rule::before,.rule::after{content:'';flex:1;height:1px;
      background:linear-gradient(90deg,transparent,var(--gold-line),transparent);}
    .rule .dia{font-size:8px;}

    .links{display:flex;flex-direction:column;gap:8px;width:100%;
      max-height:var(--links-max-h,260px);overflow:hidden auto;overscroll-behavior:contain;padding-right:2px;
      scrollbar-width:thin;scrollbar-color:rgba(var(--gold-rgb),.5) transparent;}
    .links::-webkit-scrollbar{width:5px;}
    .links::-webkit-scrollbar-thumb{background:rgba(var(--gold-rgb),.45);border-radius:3px;}
    .links::-webkit-scrollbar-track{background:transparent;}
    a.tlink{
      display:flex;align-items:center;gap:7px;
      padding:8px 9px;text-decoration:none;
      border:1px solid rgba(var(--gold-rgb),.28);border-radius:6px;
      color:var(--gold-bright);font-size:12.5px;letter-spacing:.02em;
      background:rgba(var(--gold-rgb),.03);
      transition:background .18s ease,border-color .18s ease,transform .15s ease,color .18s ease;
    }
    a.tlink .star{color:var(--gold);font-size:9px;opacity:.85;flex:0 0 auto;transition:transform .25s ease;}
    a.tlink .ico{font-size:14px;line-height:1;flex:0 0 auto;}
    a.tlink .lbl{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    a.tlink .arr{flex:0 0 auto;font-family:"Spline Sans Mono",monospace;font-size:12px;
      color:var(--gold-dim);transition:transform .18s ease,color .18s ease;}
    a.tlink:hover{background:rgba(var(--gold-rgb),.12);border-color:var(--gold);transform:translateX(2px);}
    a.tlink:hover .arr{color:var(--gold-bright);transform:translateX(3px);}
    a.tlink:hover .star{transform:rotate(90deg);}
    /* placeholder / coming-soon buttons */
    a.tlink--soon{opacity:.48;cursor:default;border-style:dashed;color:var(--muted);}
    a.tlink--soon .arr{color:var(--gold-dim);}
    a.tlink--soon:hover{background:rgba(var(--gold-rgb),.03);border-color:rgba(var(--gold-rgb),.28);transform:none;}
    a.tlink--soon:hover .arr{transform:none;color:var(--gold-dim);}
    a.tlink--soon:hover .star{transform:none;}
    a.tlink .ico-img{width:14px;height:14px;object-fit:contain;border-radius:2px;filter:drop-shadow(0 0 1px rgba(var(--gold-rgb),.4));flex:0 0 auto;}

    /* ---------- search trigger + overlay ---------- */
    .theme-btn{background:none;border:none;color:inherit;font:inherit;letter-spacing:inherit;
      text-transform:inherit;cursor:pointer;padding:0;border-bottom:1px dotted transparent;
      transition:color .2s,border-color .2s;}
    .theme-btn:hover{color:var(--gold-bright);border-bottom-color:var(--gold-line);}
    .theme-btn::after{content:' [Ctrl+K]';opacity:.5;font-size:.78em;letter-spacing:.18em;}
    /* 搜索面板尺寸完全独立于卡片/容器缩放：用视口相对的 clamp() 自适应，
       不读取任何 --wrap-width / scale，所以卡片放大缩小都不影响它。 */
    .search-overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:flex-start;
      justify-content:center;padding-top:12vh;background:rgba(6,8,14,.72);backdrop-filter:blur(8px);
      animation:sfade .18s ease;}
    @keyframes sfade{from{opacity:0}to{opacity:1}}
    .search-overlay[hidden]{display:none;}
    .search-box{width:min(94vw, clamp(560px, 46vw, 880px));background:rgba(14,18,28,.94);
      border:1px solid var(--gold-line);border-radius:clamp(10px,0.8vw,16px);
      padding:clamp(20px,1.8vw,34px) clamp(20px,1.8vw,34px) clamp(14px,1.2vw,24px);
      box-shadow:0 30px 80px rgba(0,0,0,.6),inset 0 0 40px rgba(var(--gold-rgb),.05);position:relative;}
    .search-box::before{content:'';position:absolute;inset:6px;border:1px solid rgba(var(--gold-rgb),.18);
      border-radius:7px;pointer-events:none;}
    .search-orn{text-align:center;color:var(--gold);font-size:clamp(11px,0.95vw,17px);letter-spacing:.4em;
      margin-bottom:clamp(10px,0.9vw,16px);font-family:"Spline Sans Mono",monospace;}
    #searchInput{width:100%;background:transparent;border:none;border-bottom:1px solid var(--gold-line);
      color:var(--gold-bright);font-family:"Cormorant Garamond",serif;font-size:clamp(22px,2vw,36px);
      padding:clamp(6px,0.5vw,10px) 4px clamp(10px,0.9vw,16px);
      outline:none;letter-spacing:.04em;}
    #searchInput::placeholder{color:var(--muted);font-style:italic;font-size:clamp(18px,1.6vw,28px);}
    .search-results{list-style:none;padding:0;margin:clamp(10px,0.9vw,16px) 0 0;
      max-height:min(52vh,620px);overflow:auto;}
    .search-results li{margin:2px 0;}
    .search-results a{display:flex;align-items:center;gap:clamp(9px,0.9vw,14px);
      padding:clamp(8px,0.85vw,15px) clamp(10px,1vw,16px);color:var(--gold-dim);
      text-decoration:none;border:1px solid transparent;border-radius:6px;font-size:clamp(13px,1.05vw,20px);}
    .search-results a:hover, .search-results a.is-active{background:rgba(var(--gold-rgb),.12);
      border-color:var(--gold-line);color:var(--gold-bright);}
    .search-results a .lbl{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .search-results a .src{font-family:"Spline Sans Mono",monospace;font-size:clamp(10px,0.78vw,14px);
      color:var(--muted);letter-spacing:.1em;flex:0 0 auto;}
    .search-results a .ico-img{width:clamp(14px,1.3vw,22px);height:clamp(14px,1.3vw,22px);
      border-radius:2px;flex:0 0 auto;}
    .search-results a .ico{font-size:clamp(14px,1.3vw,22px);flex:0 0 auto;}
    .search-empty{padding:14px 10px;color:var(--muted);font-size:clamp(12px,1vw,18px);
      text-align:center;font-style:italic;}
    .search-hint{display:flex;gap:14px;justify-content:flex-end;font-family:"Spline Sans Mono",monospace;
      font-size:clamp(10px,0.78vw,14px);color:var(--muted);margin-top:clamp(8px,0.8vw,14px);letter-spacing:.1em;}
    .search-hint kbd{font-family:inherit;background:rgba(var(--gold-rgb),.1);border:1px solid var(--gold-line);
      padding:1px 5px;border-radius:3px;color:var(--gold-dim);}

    .foot{margin-top:auto;padding-top:12px;display:flex;align-items:center;gap:10px;
      color:var(--gold);font-size:8px;letter-spacing:.3em;opacity:.7;}

    /* ---------- hint ---------- */
    .hint{margin:20px auto 0;max-width:680px;text-align:center;color:var(--gold-dim);
      font-family:"Spline Sans Mono",monospace;font-size:10px;line-height:1.9;letter-spacing:.04em;}
    .hint p{margin:6px 0;}
    .hint .hint-orn{color:var(--gold);letter-spacing:.4em;font-size:9px;margin-bottom:2px;opacity:.7;}
    code{color:var(--gold-bright);background:rgba(var(--gold-rgb),.08);
      padding:2px 7px;border-radius:5px;border:1px solid rgba(var(--gold-rgb),.2);font-size:10px;}

    @media (prefers-reduced-motion:reduce){*{transition:none!important}}

    /* ======================================================================
       流星绕边  orbiting meteor  —  a star head trailing twinkling particles
       that travels around the whole card border. Themed via --gold-rgb.
       Trigger is set by LAYOUT.meteorMode (off / hover / click / always):
         • hover  → body.meteor-hover : glows while a card is hovered (CSS)
         • always → body.meteor-always: cards with .tcard--glow stay lit (CSS)
         • click  → JS toggles .fx on a card when clicked
       ====================================================================== */
    @property --beam-angle{ syntax:'<angle>'; inherits:false; initial-value:0deg; }

    .beam{position:absolute;inset:-1px;border-radius:13px;pointer-events:none;z-index:6;
      opacity:0;transition:opacity .45s ease;}
    body.meteor-hover  .tcard:hover .beam{opacity:1;}
    body.meteor-always .tcard--glow .beam{opacity:1;}
    .tcard.fx .beam{opacity:1;}

    /* the comet: a rotating conic arc clipped to a thin border ring */
    .beam::before{
      content:'';position:absolute;inset:0;border-radius:inherit;padding:2.5px;
      background:conic-gradient(from var(--beam-angle),
        transparent 0deg,
        transparent 270deg,
        rgba(var(--gold-rgb),.12) 300deg,
        rgba(var(--gold-rgb),.55) 332deg,
        rgba(var(--gold-rgb),1)   352deg,
        #ffffff 360deg);
      -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
              mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;  mask-composite:exclude;
      filter:drop-shadow(0 0 5px rgba(var(--gold-rgb),1)) drop-shadow(0 0 12px rgba(var(--gold-rgb),.7));
      animation:beam-spin var(--beam-dur,3.4s) linear infinite;
      animation-delay:var(--beam-delay,0s);
    }
    /* trailing sparkle particles — tiny bright pips strung behind the head */
    .beam::after{
      content:'';position:absolute;inset:0;border-radius:inherit;padding:2.5px;
      background:conic-gradient(from var(--beam-angle),
        transparent 0deg 300deg,
        rgba(255,255,255,.95) 305deg, transparent 306.4deg,
        transparent 311deg,
        rgba(255,255,255,.80) 316deg, transparent 317.1deg,
        transparent 322deg,
        rgba(255,255,255,.95) 329deg, transparent 330.3deg,
        transparent 336deg,
        rgba(255,255,255,.75) 342deg, transparent 343deg,
        transparent 348deg,
        rgba(255,255,255,.90) 351deg, transparent 352deg,
        transparent 360deg);
      -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
              mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;  mask-composite:exclude;
      filter:drop-shadow(0 0 3px rgba(var(--gold-rgb),.95)) drop-shadow(0 0 6px rgba(255,255,255,.5));
      animation:beam-spin var(--beam-dur,3.4s) linear infinite, beam-twinkle 1.1s ease-in-out infinite;
      animation-delay:var(--beam-delay,0s), var(--tw-delay,0s);
    }
    @keyframes beam-spin{ to{ --beam-angle:360deg; } }
    @keyframes beam-twinkle{ 0%,100%{opacity:.35} 50%{opacity:1} }
    @media (prefers-reduced-motion:reduce){
      .beam::before,.beam::after{animation:none!important;}
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="stars2"></div>

  <div class="search-overlay" id="searchOverlay" hidden>
    <div class="search-box" role="dialog" aria-modal="true" aria-label="搜索工具">
      <div class="search-orn">✦ &nbsp; ◆ &nbsp; ✦</div>
      <input id="searchInput" type="text" placeholder="搜索工具 · search the codex…" autocomplete="off" spellcheck="false" />
      <ul id="searchResults" class="search-results"></ul>
      <div class="search-hint"><span><kbd>↑↓</kbd> 选择</span><span><kbd>↵</kbd> 打开</span><span><kbd>esc</kbd> 关闭</span></div>
    </div>
  </div>

  <div class="wrap">
    <header class="masthead">
      <div class="orn"><span class="dia">✦ ◆ ✦</span></div>
      <p class="kicker"><span id="kickerPre">Adonais</span> · <button class="theme-btn" id="searchTrigger" type="button" aria-label="打开搜索" title="打开搜索 (Ctrl+K)">Anabiosis</button></p>
      <h1 id="hubTitle">TOOLS&nbsp;HUB</h1>
      <p class="meta" id="hubMeta">/var/www/site/index.html</p>
    </header>

    <!-- Cards render from the GROUPS config in the script below.
         To add a future group/card, add one entry to that array. -->
    <section class="spread" id="spread"></section>

    <div class="hint">
      <p class="hint-orn">✧ &nbsp; ◇ &nbsp; ✧</p>
      <p>误入者，求求你离开吧 —— 哎哟大爷啊 Orz，我不知道我不知道。</p>
      <p><code>我也只能做到这点噜</code> &nbsp;·&nbsp; <code>其实也没什么东西啦...随便看随便用吧。</code></p>
    </div>
  </div>

  <script>
    const NS = 'http://www.w3.org/2000/svg';
    const el = (n, a={}) => { const e = document.createElementNS(NS, n); for (const k in a) e.setAttribute(k, a[k]); return e; };
    const CX = 60, CY = 60;

    function sparkle(g, cx, cy, R, cls='fill'){
      const r = R*0.16;
      const d = `M${cx},${cy-R} C${cx+r},${cy-r} ${cx+r},${cy-r} ${cx+R},${cy} `
              + `C${cx+r},${cy+r} ${cx+r},${cy+r} ${cx},${cy+R} `
              + `C${cx-r},${cy+r} ${cx-r},${cy+r} ${cx-R},${cy} `
              + `C${cx-r},${cy-r} ${cx-r},${cy-r} ${cx},${cy-R} Z`;
      g.appendChild(el('path', { d, class: cls }));
    }

    function ringDots(g, cx, cy, r, n, dr=0.7){
      for(let i=0;i<n;i++){ const a=i/n*Math.PI*2; g.appendChild(el('circle',{cx:cx+r*Math.cos(a), cy:cy+r*Math.sin(a), r:dr, class:'fill'})); }
    }

    function drawMoon(svg){
      // filled crescent via two-circle evenodd path
      const R=30, ir=26, ox=14, oy=-7;
      const circ=(cx,cy,rr)=>`M${cx-rr},${cy} a${rr},${rr} 0 1,0 ${rr*2},0 a${rr},${rr} 0 1,0 ${-rr*2},0`;
      const p = el('path',{ d:`${circ(CX,CY,R)} ${circ(CX+ox,CY+oy,ir)}`, class:'fill', 'fill-rule':'evenodd' });
      svg.appendChild(p);
      const g=el('g'); svg.appendChild(g);
      sparkle(g, 34, 30, 7); sparkle(g, 86, 40, 5); sparkle(g, 80, 84, 4.5);
      // small dotted descending line
      for(let i=0;i<4;i++) g.appendChild(el('circle',{cx:96, cy:60+i*6, r:1, class:'fill'}));
    }

    function drawSun(svg){
      const g=el('g'); svg.appendChild(g);
      const N=52;
      for(let i=0;i<N;i++){
        const a=i/N*Math.PI*2;
        const inner=20, outer=(i%2? 50 : 40);
        g.appendChild(el('line',{x1:CX+inner*Math.cos(a),y1:CY+inner*Math.sin(a),
          x2:CX+outer*Math.cos(a),y2:CY+outer*Math.sin(a),class:'ln-d'}));
      }
      svg.appendChild(el('circle',{cx:CX,cy:CY,r:16,class:'ln'}));
      sparkle(svg, CX, CY, 7, 'fill');
      // outer dotted ring
      const ring=el('g'); svg.appendChild(ring); ringDots(ring, CX, CY, 56, 60, 0.7);
    }

    function drawStar(svg){
      const g=el('g'); svg.appendChild(g);
      // large 8-point burst = two crossed sparkles
      sparkle(g, 56, 50, 30); sparkle(g, 56, 50, 18);
      svg.appendChild(el('circle',{cx:56,cy:50,r:3.5,class:'fill'}));
      // dotted shooting trail
      for(let i=0;i<8;i++) g.appendChild(el('circle',{cx:74+i*5, cy:78+i*4.2, r:1.5-i*0.12, class:'fill'}));
      // scattered minor stars
      sparkle(g, 24, 34, 5); sparkle(g, 96, 28, 4); sparkle(g, 30, 92, 4.5);
    }

    function drawWheel(svg){
      svg.appendChild(el('circle',{cx:CX,cy:CY,r:48,class:'ln'}));
      svg.appendChild(el('circle',{cx:CX,cy:CY,r:40,class:'ln-d'}));
      svg.appendChild(el('circle',{cx:CX,cy:CY,r:18,class:'ln'}));
      // tick ring between r40 and r48
      const g=el('g'); svg.appendChild(g);
      const N=72;
      for(let i=0;i<N;i++){ const a=i/N*Math.PI*2; const o=(i%6===0?34:40);
        g.appendChild(el('line',{x1:CX+o*Math.cos(a),y1:CY+o*Math.sin(a),
          x2:CX+48*Math.cos(a),y2:CY+48*Math.sin(a),class:'ln-d'})); }
      // cardinal crossing
      svg.appendChild(el('line',{x1:CX,y1:CY-18,x2:CX,y2:CY+18,class:'ln-d'}));
      svg.appendChild(el('line',{x1:CX-18,y1:CY,x2:CX+18,y2:CY,class:'ln-d'}));
      sparkle(svg, CX, CY, 8, 'fill');
      sparkle(svg, CX, 8, 4.5, 'fill');

    function drawButterfly(svg){
      const cx=60, cy=56;

      svg.appendChild(el('circle',{cx,cy,r:35,class:'ln'}));

      sparkle(svg, cx, 14, 4.5, 'fill');
      // small four-pointed star above the head (between the upper wings)
      sparkle(svg, cx, 38, 3, 'fill');
      // RIGHT half wings, then mirror for symmetry (no insect body)
      const right = el('g');
      right.appendChild(el('path',{class:'ln',
        d:'M60,50 C66,32 80,22 92,28 C102,33 100,48 86,53 C74,57 64,55 60,52 Z'}));
      right.appendChild(el('path',{class:'ln',

      right.appendChild(el('path',{class:'ln-d',d:'M61,50 C70,40 80,35 90,34'}));
      right.appendChild(el('path',{class:'ln-d',d:'M61,57 C69,64 76,73 78,82'}));

      right.appendChild(el('path',{class:'ln',

      const GOLD='var(--gold)', GOLDD='var(--gold-dim)';
      const g = el('g',{transform:'translate(60 56) scale(0.26) translate(-340 -270)'});

        ray.appendChild(el('circle',{cx:340,cy:76,r:6,fill:GOLD}));

      // five rounded petals (outline only)
      const petal='M 340 268 C 318 266 298 256 290 234 C 280 210 290 184 308 178 C 318 175 326 176 332 182 C 335 184 338 186 340 186 C 342 186 345 184 348 182 C 354 176 362 175 372 178 C 390 184 400 210 390 234 C 382 256 362 266 340 268 Z';
      [0,72,144,216,288].forEach(a=>g.appendChild(el('path',{d:petal,transform:`rotate(${a} 340 270)`,fill:'none',stroke:GOLD,'stroke-width':4,'stroke-linejoin':'round'})));

    /* apply LAYOUT to CSS variables, theme, background, and masthead text */
    (function applyLayout(){
      const L = (typeof LAYOUT === 'object' && LAYOUT) ? LAYOUT : {};

      // 布局
      root.setProperty('--cols', String(L.columns || 6));

      // 卡片高度：cardMinHeight=0 表示自适应内容，否则固定最小高度；链接滚动区高度跟着算
      const cmh = (L.cardMinHeight != null ? Number(L.cardMinHeight) : 430);
      if (!cmh || cmh <= 0){
        root.setProperty('--card-min-h', 'auto');

        root.setProperty('--links-max-h', Math.max(120, cmh - 170) + 'px');
      }
      // 主题色（找不到预设时回退到 gold）

      root.setProperty('--gold', t.gold);

      root.setProperty('--gold-bright', t.bright);
      root.setProperty('--gold-line', t.line);
      root.setProperty('--gold-dim', t.dim);
      root.setProperty('--gold-numeral', t.numeral);
      root.setProperty('--ink', t.ink);
      root.setProperty('--muted', t.muted);
      root.setProperty('--h1', t.h1);
      // 背景图 + 模糊：用一个独立的固定层来承载背景，模糊只作用于它，不影响文字
      let bgLayer = document.getElementById('pageBgLayer');
      if (!bgLayer){
        bgLayer = document.createElement('div'); bgLayer.id = 'pageBgLayer';
        document.addEventListener('DOMContentLoaded', () => document.body.prepend(bgLayer));
        if (document.body) document.body.prepend(bgLayer);
      }
      const blur = Math.max(0, Number(L.pageBgBlur) || 0);
      if (L.pageBg){
        bgLayer.style.backgroundImage = 'url("' + L.pageBg + '")';
        bgLayer.style.filter = 'blur(' + blur + 'px)';
        bgLayer.style.display = 'block';
        document.body.classList.add('has-bg-layer');

        if (btn && L.searchLabel != null) btn.textContent = L.searchLabel;
        if (h && L.title != null) h.textContent = L.title;
        if (m && L.meta != null) m.textContent = L.meta;
      };
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', setText);
      else setText();
    })();

    const EMBLEMS = ['moon','sun','star','wheel','butterfly','anemone'];
    const ROMAN = ['','I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV','XVI'];
    const toRoman = n => ROMAN[n] || ('#' + n);
    const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const isUrlStr = s => typeof s === 'string' && /^(https?:|\/|\.{1,2}\/)/.test(s);
    function iconLead(l){
      if (isUrlStr(l.icon)) return `<img class="ico ico-img" src="${esc(l.icon)}" alt="" loading="lazy">`;
      return `<span class="ico">${l.icon ? esc(l.icon) : '✦'}</span>`;
    }

    function renderGroups(){
      const spread = document.getElementById('spread');
      const visible = GROUPS.filter(g => !g.hidden);
      spread.innerHTML = visible.map((g, i) => {
        const emblem = g.emblem || EMBLEMS[i % EMBLEMS.length];
        const linkHTML = (l) => {
          const soon = !!l.soon;
          const cls  = 'tlink' + (soon ? ' tlink--soon' : '');
          const href = soon ? '#' : esc(l.href);
          const arr  = soon ? '⋯' : '→';
          const att  = soon ? ' tabindex="-1" aria-disabled="true"' : '';
          const lead = soon ? '<span class="star">✦</span>' : iconLead(l);
          return `<a class="${cls}" href="${href}"${att}>${lead}<span class="lbl">${esc(l.label)}</span><span class="arr">${arr}</span></a>`;
        };
        // 占位“预测中…”行：数量与文案由 LAYOUT 控制（soonCount=0 则完全不显示）
        const _L = (typeof LAYOUT === 'object' && LAYOUT) ? LAYOUT : {};
        const soonN = Math.max(0, (_L.soonCount != null ? Number(_L.soonCount) : 4) | 0);
        const soonText = (_L.soonLabel != null ? _L.soonLabel : '预测中...');
        const soonRows = Array.from({ length: soonN }, () => linkHTML({ label: soonText, soon: true }));
        const links = [ ...(g.links || []).map(linkHTML), ...soonRows ].join('');
        // emblem: external image if provided, else the drawn motif — wrapped as a hyperlink
        const ext = /^https?:\/\//i.test(g.link || '');
        const inner = g.image
          ? `<img class="emblem-img" src="${esc(g.image)}" alt="${esc(g.title)}">`
          : `<svg class="emblem" viewBox="0 0 120 120" data-emblem="${emblem}" aria-hidden="true"></svg>`;
        const emblemMarkup = g.link
          ? `<a class="emblem-link" href="${esc(g.link)}"${ext ? ' target="_blank" rel="noopener"' : ''}>${inner}</a>`
          : `<div class="emblem-link">${inner}</div>`;
        const sealed = (g.links || []).length === 0;
        const titleText = sealed ? '\uD835\uDCE2\uD835\uDCEE\uD835\uDCEA\uD835\uDCF5\uD835\uDCEE\uD835\uDCED' : g.title;
        // 流星绕边：每张卡随机转速 + 起始相位，避免多张同亮时齐步走
        const _dur   = (3.0 + Math.random() * 2.4).toFixed(2);
        const _delay = (-(Math.random() * _dur)).toFixed(2);
        const _tw    = (-(Math.random() * 1.1)).toFixed(2);

    /* 流星绕边：按 LAYOUT.meteorMode 设定触发方式

    (function applyMeteor(){
      const mode = ((typeof LAYOUT === 'object' && LAYOUT && LAYOUT.meteorMode) || 'off');
      document.body.classList.add('meteor-' + mode);
      if (mode !== 'click') return;
      const spread = document.getElementById('spread');
      spread.addEventListener('click', e => {
        if (e.target.closest('.tlink')) return;               // 不影响真实链接
        const card = e.target.closest('.tcard'); if (!card) return;
        if (e.target.closest('.emblem-link')) e.preventDefault(); // 徽记可能是 href="#"

      });
    })();

        }));
      });

      let activeIdx = 0;
      let lastItems = [];

      function renderResults(q){
        const ql = q.trim().toLowerCase();
        const items = ALL.filter(x =>
          !ql ||
          (x.label || '').toLowerCase().includes(ql) ||
          (x.group || '').toLowerCase().includes(ql)
        );
        lastItems = items;
        activeIdx = 0;
        if (!items.length){
          results.innerHTML = '<li class="search-empty">无结果 · nothing in the codex</li>';
          return;
        }
        results.innerHTML = items.map((x, i) => {
          const lead = iconLead(x);
          return `<li><a href="${esc(x.href)}" data-i="${i}" class="${i===0?'is-active':''}">${lead}<span class="lbl">${esc(x.label)}</span><span class="src">${esc(x.numeral)} · ${esc(x.group)}</span></a></li>`;
        }).join('');
      }

      function setActive(idx){
        const links = results.querySelectorAll('a');
        if (!links.length) return;
        links[activeIdx]?.classList.remove('is-active');
        activeIdx = (idx + links.length) % links.length;
        const el = links[activeIdx];
        el.classList.add('is-active');
        const top = el.offsetTop, h = el.offsetHeight;
        if (top < results.scrollTop) results.scrollTop = top;
        else if (top + h > results.scrollTop + results.clientHeight) results.scrollTop = top + h - results.clientHeight;
      }

      function openSearch(){
        overlay.hidden = false;
        input.value = '';
        renderResults('');
        setTimeout(() => input.focus(), 0);
      }
      function closeSearch(){ overlay.hidden = true; }

      trigger.addEventListener('click', openSearch);
      input.addEventListener('input', () => renderResults(input.value));
      overlay.addEventListener('click', e => { if (e.target === overlay) closeSearch(); });
      results.addEventListener('mousemove', e => {
        const a = e.target.closest('a[data-i]');
        if (a) setActive(+a.dataset.i);
      });

      window.addEventListener('keydown', e => {
        const isOpen = !overlay.hidden;
        const meta = e.ctrlKey || e.metaKey;
        if (meta && e.key.toLowerCase() === 'k'){ e.preventDefault(); isOpen ? closeSearch() : openSearch(); return; }
        if (!isOpen){
          if (e.key === '/' && !/^(input|textarea)$/i.test(document.activeElement.tagName)){
            e.preventDefault(); openSearch();
          }
          return;
        }
        if (e.key === 'Escape'){ e.preventDefault(); closeSearch(); }
        else if (e.key === 'ArrowDown'){ e.preventDefault(); setActive(activeIdx + 1); }
        else if (e.key === 'ArrowUp'){ e.preventDefault(); setActive(activeIdx - 1); }
        else if (e.key === 'Enter'){
          const links = results.querySelectorAll('a');
          if (links[activeIdx]){ e.preventDefault(); links[activeIdx].click(); }
        }
      });
    })();

    const drawers = { moon:drawMoon, sun:drawSun, star:drawStar, wheel:drawWheel, butterfly:drawButterfly, anemone:drawAnemone };
    document.querySelectorAll('.emblem').forEach(s => { const f=drawers[s.dataset.emblem]; if(f) f(s); });

    // starfield via box-shadow
    function field(w,h,n,maxR){
      const out=[]; for(let i=0;i<n;i++){
        out.push(`${(Math.random()*w)|0}px ${(Math.random()*h)|0}px 0 ${(Math.random()*maxR).toFixed(1)}px`);
      } return out.join(',');
    }
    function makeStars(){
      const W = Math.max(window.innerWidth, 1400), H = Math.max(window.innerHeight, 1000);
      document.querySelector('.stars').style.boxShadow  = field(W,H,90,0.5);
      document.querySelector('.stars2').style.boxShadow = field(W,H,50,0.9);
    }
    makeStars();

    // ---- scale the whole hub to fit the viewport (no page scroll) ----
    const wrapEl = document.querySelector('.wrap');
    function fitWrap(){
      const onePage = !(typeof LAYOUT === 'object' && LAYOUT && LAYOUT.forceOnePage === false);
      // 允许滚动模式：卡片保持原始大小，超出就让页面纵向滚动
      if (!onePage){
        wrapEl.style.transform='none';
        document.body.style.height='auto';
        document.body.style.minHeight='100vh';
        document.body.style.overflow='auto';
        document.body.style.alignItems='flex-start';
        document.body.style.paddingTop='28px';
        document.body.style.paddingBottom='28px';
        return;
      }
      // 强制一页模式（原行为）
      document.body.style.alignItems='center';
      document.body.style.paddingTop='0';
      document.body.style.paddingBottom='0';
      if(window.innerWidth < 760){
        wrapEl.style.transform='none';
        document.body.style.height='auto';
        document.body.style.overflow='auto';
        return;
      }
      document.body.style.height='100vh';
      document.body.style.overflow='hidden';
      wrapEl.style.transform='none';
      const w=wrapEl.offsetWidth, h=wrapEl.offsetHeight;
      const s=Math.min((window.innerWidth-36)/w, (window.innerHeight-36)/h);
      wrapEl.style.transform='scale('+s+')';
    }
    window.addEventListener('resize', fitWrap);
    let starTimer;
    window.addEventListener('resize', () => { clearTimeout(starTimer); starTimer = setTimeout(makeStars, 180); });
    fitWrap();
    if(document.fonts && document.fonts.ready){ document.fonts.ready.then(fitWrap); }
  </script>
</body>
</html>
